<svg width="840" height="270" viewBox="0 0 840 270" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hello, I am Javis</title>
  <desc id="desc">Hello, I am Javis. 4,610,318,881 tokens · 70-day streak, live from Token Monitor.</desc>
  <defs>
    <linearGradient id="rule" x1="190" y1="0" x2="650" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0969DA" stop-opacity="0"/>
      <stop offset=".16" stop-color="#0969DA" stop-opacity=".55"/>
      <stop offset=".5" stop-color="#0969DA"/>
      <stop offset="1" stop-color="#0969DA"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="190" y1="0" x2="650" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#54AEFF" stop-opacity="0"/>
      <stop offset=".16" stop-color="#54AEFF" stop-opacity=".6"/>
      <stop offset=".5" stop-color="#54AEFF"/>
      <stop offset="1" stop-color="#54AEFF"/>
    </linearGradient>
    <filter id="soften" x="-5%" y="-300%" width="110%" height="700%">
      <feGaussianBlur stdDeviation=".6"/>
    </filter>
  </defs>
  <style>
    @font-face { font-family: 'Inter'; font-style: normal; font-weight: 600; src: url(data:font/woff2;base64,) format('woff2'); }
    @font-face { font-family: 'Geist Mono'; font-style: normal; font-weight: 400; src: url(data:font/woff2;base64,) format('woff2'); }
    .headline { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .counter { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
    .headline { animation: rise .9s cubic-bezier(.2,.6,.2,1) both; }
    .hairline { stroke-dasharray: 1 2; animation: draw 2.4s cubic-bezier(.45,0,.2,1) .4s both; }
    .pulse { animation: comet 9s linear 4s infinite; }
    .now { transform-box: fill-box; transform-origin: center; animation: fade .7s ease-out 2.5s both, beat 9s ease-in-out 4s infinite; }
    .counter { animation: fade .8s ease-out 1.5s both; }
    @keyframes rise { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
    @keyframes draw { from { stroke-dashoffset: 1.35; } to { stroke-dashoffset: 0; } }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    /* -.93 = comet tip touches the dot, -1 = fully absorbed; the beat is keyed to those moments */
    @keyframes comet {
      0% { stroke-dashoffset: .2; animation-timing-function: cubic-bezier(.5,.05,.55,.95); }
      26% { stroke-dashoffset: -.93; animation-timing-function: linear; }
      30%, 100% { stroke-dashoffset: -1.14; }
    }
    @keyframes beat { 0%, 26% { transform: none; } 31% { transform: scale(1.5); } 43%, 100% { transform: none; } }
    @media (prefers-reduced-motion: reduce) {
      .headline, .hairline, .pulse, .now, .counter { animation: none; }
    }
  </style>
